version: '3.9'
services:
  frontend:
    image: node:20-alpine
    container_name: socratic-frontend
    working_dir: /app
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    volumes:
      - ./:/app
    depends_on:
      - backend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

  backend:
    build:
      context: ./backend
    container_name: socratic-backend
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/socratic
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: socratic-postgres
    environment:
      POSTGRES_DB: socratic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: socratic-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
